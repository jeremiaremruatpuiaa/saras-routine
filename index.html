<script>
// ── CONSTANTS ──────────────────────────────────────────
const MORNING_DEF=[
  {id:'m1',e:'⏰',l:'Wake up & stretch'},
  {id:'m3',e:'👗',l:'Get dressed'},
  {id:'m4',e:'🍳',l:'Eat breakfast'},
  {id:'m2',e:'🦷',l:'Brush your teeth'},
  {id:'m5',e:'🎒',l:'Pack your school bag'},
];
const AFTER_DEF=[
  {id:'a1',e:'🧼',l:'Wash your hands'},
  {id:'a5',e:'🍱',l:'Unpack tiffin'},
  {id:'a3',e:'✏️',l:'Do your homework'},
  {id:'a2',e:'🧹',l:'Help mom with chores'},
];
const NIGHT_DEF=[
  {id:'n1',e:'🍽️',l:'Eat dinner'},
  {id:'n3',e:'🦷',l:'Brush your teeth'},
  {id:'n4',e:'📖',l:'Reading time (20 mins)'},
  {id:'n5',e:'💤',l:'Lights out — sleep tight!'},
];
const WEEKEND_DEF=[
  {id:'w1',e:'🛏️',l:'Make your bed'},
  {id:'w2',e:'🧹',l:'Help with one chore'},
  {id:'w3',e:'🌳',l:'Outdoor playtime'},
  {id:'w4',e:'❤️',l:'Family time'},
  {id:'w5',e:'🌙',l:'Bedtime routine'},
];
const HOLIDAY_DEF=[
  {id:'h1',e:'🛏️',l:'Make your bed'},
  {id:'h2',e:'🌳',l:'Play outside'},
  {id:'h3',e:'📖',l:'Reading time'},
  {id:'h4',e:'❤️',l:'Family time'},
  {id:'h5',e:'🌙',l:'Bedtime routine'},
];
const BATH={id:'bath',e:'🛁',l:'Bath time'};

const EG=[
  {n:'⏰ Daily',e:['⏰','🌅','🌄','🌙','💤','😴','☀️','🌤️','🌈','✨','🌟','⭐','💫']},
  {n:'🧼 Hygiene',e:['🛁','🚿','🦷','🧼','🪥','💊','🧴','🧻','🪒','🧽']},
  {n:'👗 Clothing',e:['👗','👟','👕','👔','🧢','🎀','👒','👜','🧣','👛','🩰']},
  {n:'🍳 Food',e:['🍳','🥐','🥞','🍎','🍱','🥗','🍕','🍫','🥤','🧃','🍦','🧁','🍰','🥪','🍔','🥑','🍇','🍓','🫐','🍊']},
  {n:'📚 School',e:['📚','📖','✏️','📝','📐','🖊️','🎒','🏫','📓','📏','📌','🔍','📎','🖍️']},
  {n:'🏠 Home',e:['🛏️','🧹','🍽️','🧺','🏠','🪣','🌿','🛋️','🚪','🪑','🪴','🧸']},
  {n:'🌳 Play',e:['🌳','🏃','🎨','🎮','🎵','🏊','⚽','🚴','🎭','🎪','🎠','🎡','🎯','🏖️','🌴','🎸','🎤','🎺','🎻','🎲','🃏','🧩']},
  {n:'❤️ Love',e:['❤️','💕','🤗','💝','🌸','🫂','💖','💗','💛','💚','💙','💜','🧡','🥰']},
  {n:'🏆 Wins',e:['🏆','🥇','💪','🙌','⭐','🌟','💫','✨','🎉','🎊','🎁','🎀','🥳','🤩','😎']},
  {n:'🐱 Animals',e:['🦄','🐱','🐼','🐰','🦋','🐶','🐸','🐨','🐯','🦊','🐮','🐷','🦁','🐬','🦒','🦓','🐘','🦜']},
  {n:'🌺 Nature',e:['🌺','🌻','🌹','🌷','🌸','🍀','🌿','🌲','🌴','🌵','🌙','☀️','🌈','🌊','❄️','🔥','🌍']},
  {n:'😊 Faces',e:['😊','😍','🥰','😎','🤩','🥳','😴','🤗','😇','🙃','🤓','😋','🤪','😜','😝']},
];

const LEVELS=[{min:0,name:'Seedling',emoji:'🌱'},{min:10,name:'Rising Star',emoji:'⭐'},{min:30,name:'Super Star',emoji:'🌟'},{min:70,name:'Champion',emoji:'💫'},{min:150,name:'Legend',emoji:'👑'}];
const AVATARS=['🦄','🌟','👸','🦋','🐱','🐼','🌈','🐰','🌺','🎀','😊','🥰','🤩','😎','🥳','🦁','🐬','🦊','🐨','🎨','⭐','💖','🌸','🍀','🎵'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── LOCALSTORAGE (works on GitHub Pages) ───────────────
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ld(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}

// ── DATE HELPERS ───────────────────────────────────────
function routineDay(){
  const n=new Date(),b=n.getHours()>=6?n:new Date(n-86400000);
  return `${b.getFullYear()}-${String(b.getMonth()+1).padStart(2,'0')}-${String(b.getDate()).padStart(2,'0')}`;
}
function prevDay(s){const[y,m,d]=s.split('-').map(Number),p=new Date(y,m-1,d-1);return `${p.getFullYear()}-${String(p.getMonth()+1).padStart(2,'0')}-${String(p.getDate()).padStart(2,'0')}`;}
function msToReset(){const n=new Date(),nx=new Date(n);nx.setHours(6,0,0,0);if(n.getHours()>=6)nx.setDate(nx.getDate()+1);return nx-n;}
function getLvl(s){let lv=LEVELS[0];for(const l of LEVELS)if(s>=l.min)lv=l;return lv;}
function getNextLvl(s){for(const l of LEVELS)if(s<l.min)return l;return null;}
function calcStreak(cd,hd){
  const cs=new Set(cd),hs=new Set(hd||[]);let day=routineDay(),n=0;
  while(true){if(cs.has(day)){n++;day=prevDay(day);}else if(hs.has(day)){day=prevDay(day);}else break;}
  return n;
}

let customTasks=null;
function base(k,def){return(customTasks&&customTasks[k])?customTasks[k]:def;}

function getSections(d){
  const m=[...base('morning',MORNING_DEF)],nt=[...base('night',NIGHT_DEF)];
  if(d===1)m.splice(1,0,BATH);
  if(d===2||d===4)nt.splice(1,0,BATH);
  if(d===0||d===6){
    const tasks=[...base('weekend',WEEKEND_DEF)];
    if(d===6)tasks.splice(tasks.length-1,0,BATH);
    return [{id:'weekend',title:'Weekend Fun List',icon:'🌈',tasks}];
  }
  return[{id:'morning',title:'Morning Routine',icon:'🌅',tasks:m},{id:'after',title:'After School',icon:'📚',tasks:[...base('after',AFTER_DEF)]},{id:'night',title:'Night Routine',icon:'🌙',tasks:nt}];
}
function getHolSec(){return{id:'holiday',title:'Holiday Fun!',icon:'🏖️',tasks:[...base('holiday',HOLIDAY_DEF)]};}

// ── AUDIO ──────────────────────────────────────────────
let ac=null;
function initAc(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(ac?.state==='suspended')ac.resume();}
function tone(f,dur,type='sine',vol=0.2,delay=0){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=type;o.frequency.value=f;const t=ac.currentTime+delay;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}
function playTick(){initAc();tone(650,.12,'sine',.18);tone(1000,.1,'sine',.14,.07);}
function playSec(){initAc();[523,659,784].forEach((f,i)=>tone(f,.3,'sine',.18,i*.12));}
function playWin(){initAc();[523,659,784,1047,1047,784,1047].forEach((f,i)=>tone(f,.35,'sine',.2,i*.13));}

// ── CONFETTI ───────────────────────────────────────────
const cc=document.getElementById('cc'),c2=cc.getContext('2d');
let cparts=[],crun=false;
const COLS=['#9b59b6','#e91e8c','#f48fb1','#ffd700','#c39bd3','#f39c12','#ff6b9d'];
const HCOLS=['#f39c12','#f1c40f','#e67e22','#ff6b9d','#ffd700','#27ae60'];
function launchConfetti(hol=false){
  cc.width=window.innerWidth;cc.height=window.innerHeight;
  const p=hol?HCOLS:COLS;
  cparts=Array.from({length:160},()=>({x:Math.random()*cc.width,y:-20,r:Math.random()*8+4,color:p[Math.floor(Math.random()*p.length)],vx:(Math.random()-.5)*5,vy:Math.random()*4+2,spin:(Math.random()-.5)*.3,angle:Math.random()*Math.PI*2,shape:Math.random()>.5?'r':'c'}));
  if(!crun){crun=true;animC();}
}
function animC(){c2.clearRect(0,0,cc.width,cc.height);cparts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;p.vy+=.06;c2.save();c2.translate(p.x,p.y);c2.rotate(p.angle);c2.fillStyle=p.color;if(p.shape==='c'){c2.beginPath();c2.arc(0,0,p.r/2,0,Math.PI*2);c2.fill();}else c2.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.5);c2.restore();});cparts=cparts.filter(p=>p.y<cc.height+20);if(cparts.length)requestAnimationFrame(animC);else{crun=false;c2.clearRect(0,0,cc.width,cc.height);}}

// ── STAR POP ───────────────────────────────────────────
const sp=document.getElementById('starPop');
function showStarPop(x,y){sp.textContent='+1 ⭐';sp.style.cssText=`left:${x-20}px;top:${y-40}px;display:block;opacity:1;transform:translateY(0);transition:none;`;setTimeout(()=>{sp.style.cssText+=`;transition:all .8s ease;opacity:0;transform:translateY(-55px);`;},50);setTimeout(()=>{sp.style.display='none';},950);}

// ── STATE ──────────────────────────────────────────────
let profile=null,gamedata={totalStars:0,completedDays:[],holidayDays:[]},rState={},activeTab='',secs=[];
let rDay=routineDay(),rKey=`routine:${rDay}`;
const now=new Date(),dow=now.getDay();
let selAv=AVATARS[0];

function refreshSecs(){secs=rState._holiday?[getHolSec()]:getSections(dow);}

function loadAll(){
  profile=ld('profile');
  const gd=ld('gamedata');
  if(gd){gamedata=gd;if(!gamedata.holidayDays)gamedata.holidayDays=[];}
  customTasks=ld('customTasks');
  rState=ld(rKey)||{};
  refreshSecs();activeTab=secs[0].id;
  profile?showMain():showOnboarding();
}

// ── ONBOARDING ─────────────────────────────────────────
function buildAvGrid(containerId,currentSel,onSelect){
  const g=document.getElementById(containerId);if(!g)return;
  g.innerHTML='';
  AVATARS.forEach(av=>{
    const b=document.createElement('button');
    b.className='av'+(av===currentSel?' sel':'');b.textContent=av;
    b.onclick=()=>{onSelect(av);g.querySelectorAll('.av').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    g.appendChild(b);
  });
}

function showOnboarding(){
  document.getElementById('ob').innerHTML=`<div class="ob-wrap">
    <div class="ob-logo">✨</div><div class="ob-h">Hello there!</div>
    <div class="ob-s">Let's set up your daily routine 🌸</div>
    <div class="ob-lbl">What's your name?</div>
    <input class="ob-in" id="nin" placeholder="Type your name..." maxlength="20"/>
    <div class="ob-lbl">Pick your avatar!</div>
    <div class="av-grid" id="avGrid"></div>
    <button class="go-btn" onclick="submitOb()">Let's Go! 🚀</button>
  </div>`;
  buildAvGrid('avGrid',AVATARS[0],av=>selAv=av);
  document.getElementById('nin').addEventListener('keydown',e=>{if(e.key==='Enter')submitOb();});
}

function submitOb(){
  const name=(document.getElementById('nin').value||'').trim();
  if(!name){document.getElementById('nin').style.borderColor='var(--pink)';return;}
  profile={name,avatar:selAv};sv('profile',profile);
  document.getElementById('ob').innerHTML='';showMain();
}

// ── DRAWER ─────────────────────────────────────────────
function openDrawer(){document.getElementById('dov').classList.add('show');document.getElementById('drw').classList.add('open');}
function closeDrawer(){document.getElementById('dov').classList.remove('show');document.getElementById('drw').classList.remove('open');}

// ── MAIN ───────────────────────────────────────────────
function showMain(){
  document.getElementById('app').style.display='block';
  renderAll();
  setTimeout(()=>location.reload(),msToReset());
}

function renderAll(){
  const isHol=!!rState._holiday;
  document.getElementById('app').innerHTML=`
    <div id="hdr"></div>
    <div id="holBtn"></div>
    <div class="stats" id="stats"></div>
    <div id="lvl"></div>
    <div class="pc">
      <div class="pt"><span>${isHol?'🏖️ Holiday Progress':'⭐ Today\'s Progress'}</span><span id="ptxt">0/0</span></div>
      <div class="pbg"><div class="${isHol?'pfill hol':'pfill'}" id="pfill" style="width:0%"></div></div>
      <div class="reward${isHol?' hol':''}" id="rwd">${isHol?'🎉 Amazing holiday! Great job! 🏖️✨':'🎉 You\'re a superstar! Every task done! 🌟💖'}</div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="sdiv"></div>`;
  renderHdr();renderHolBtn();renderStats();renderLvl();renderTabs();renderSec();updateProg();
}

function renderHdr(){
  const el=document.getElementById('hdr');if(!el)return;
  const lv=getLvl(gamedata.totalStars),isHol=!!rState._holiday;
  el.innerHTML=`<div class="hdr ${isHol?'holiday':'normal'}">
    <div class="hav">${isHol?'🏖️':profile.avatar}</div>
    <div class="hin"><div class="hname">${profile.name}'s ${isHol?'Holiday!':'Routine'}</div>
    <div class="hlvl">${isHol?'🌴 Holiday Mode':`${lv.emoji} ${lv.name}`} · ${DAYS[dow]}, ${MONTHS[now.getMonth()]} ${now.getDate()}</div></div>
    <div class="hstars"><span class="hsc">⭐ ${gamedata.totalStars}</span><span class="hsl">Stars</span></div>
    <button class="ham" onclick="openDrawer()">☰</button>
  </div>`;
}

function renderHolBtn(){
  const el=document.getElementById('holBtn');if(!el)return;
  const isHol=!!rState._holiday;
  el.innerHTML=`<button class="hol-btn ${isHol?'on':'off'}" onclick="toggleHoliday()">${isHol?'🏖️ Holiday Mode On — Tap to Switch Back':'🏖️ Mark Today as Holiday'}</button>`;
}

function renderStats(){
  const el=document.getElementById('stats');if(!el)return;
  const streak=calcStreak(gamedata.completedDays,gamedata.holidayDays),isHol=!!rState._holiday;
  el.innerHTML=`<div class="scard"><span class="sv">🔥 ${streak}</span><span class="sl">Day Streak${isHol?' 🏖️':''}</span></div>
    <div class="scard"><span class="sv">🏆 ${gamedata.completedDays.length}</span><span class="sl">Days Completed</span></div>`;
}

function renderLvl(){
  const el=document.getElementById('lvl');if(!el)return;
  const s=gamedata.totalStars,lv=getLvl(s),nx=getNextLvl(s);
  const pct=nx?Math.round(((s-lv.min)/(nx.min-lv.min))*100):100;
  el.innerHTML=`<div class="lvlc"><div class="lvlt"><span>${lv.emoji} ${lv.name}</span><span style="color:var(--muted);font-size:.75rem">${nx?`Next: ${nx.emoji} ${nx.name} at ${nx.min}⭐`:'👑 Max Level!'}</span></div><div class="lbg"><div class="lfill" style="width:${pct}%"></div></div></div>`;
}

function renderTabs(){
  const el=document.getElementById('tabs');if(!el)return;
  if(secs.length<=1){el.innerHTML='';return;}
  el.innerHTML='';
  secs.forEach(s=>{
    const done=s.tasks.filter(t=>rState[t.id]).length;
    const b=document.createElement('button');
    b.className='tab'+(activeTab===s.id?' active':'');
    b.innerHTML=`<span class="ti">${s.icon}</span>${s.title}<span class="td">${done}/${s.tasks.length}</span>`;
    b.onclick=()=>{activeTab=s.id;renderTabs();renderSec();};
    el.appendChild(b);
  });
}

function renderSec(){
  const sd=document.getElementById('sdiv');if(!sd)return;
  const isHol=!!rState._holiday,sec=secs.find(s=>s.id===activeTab)||secs[0];
  sd.innerHTML='';const el=document.createElement('div');el.className='sec';
  const done=sec.tasks.filter(t=>rState[t.id]).length;
  el.innerHTML=`<div class="sh"><span class="si">${sec.icon}</span><span class="st">${sec.title}</span><span class="sc" id="scc">${done}/${sec.tasks.length}</span></div>`;
  sec.tasks.forEach(t=>{
    const isDone=!!rState[t.id],div=document.createElement('div');
    div.className=`task ${isDone?(isHol?'hd':'d'):'u'}`;div.dataset.id=t.id;
    div.innerHTML=`<div class="cb">${isDone?'✓':''}</div><span class="te">${t.e}</span><span class="tl">${t.l}</span>`;
    if(!isDone)div.onclick=ev=>checkTask(t.id,ev);
    el.appendChild(div);
  });
  sd.appendChild(el);
}

function updateProg(){
  const all=secs.flatMap(s=>s.tasks),done=all.filter(t=>rState[t.id]).length,pct=all.length?(done/all.length)*100:0;
  const pt=document.getElementById('ptxt'),pf=document.getElementById('pfill'),rw=document.getElementById('rwd');
  if(pt)pt.textContent=`${done}/${all.length}`;if(pf)pf.style.width=pct+'%';
  if(rw)rw.style.display=(done===all.length&&all.length>0)?'block':'none';
}

// ── EDIT ROUTINE ───────────────────────────────────────
const EDIT_SECS=[{k:'morning',l:'🌅 Morning'},{k:'after',l:'📚 After School'},{k:'night',l:'🌙 Night'},{k:'weekend',l:'🌈 Weekend'},{k:'holiday',l:'🏖️ Holiday'}];
let editSec='morning',editDraft={},epCb=null;

function openEdit(){
  editDraft={
    morning:JSON.parse(JSON.stringify(base('morning',MORNING_DEF))),
    after:JSON.parse(JSON.stringify(base('after',AFTER_DEF))),
    night:JSON.parse(JSON.stringify(base('night',NIGHT_DEF))),
    weekend:JSON.parse(JSON.stringify(base('weekend',WEEKEND_DEF))),
    holiday:JSON.parse(JSON.stringify(base('holiday',HOLIDAY_DEF))),
  };
  editSec='morning';
  const m=document.getElementById('editMod');
  m.innerHTML=`
    <div class="em-top">
      <button class="em-back" onclick="closeEdit()">← Back</button>
      <span class="em-title">✏️ Edit Routine</span>
      <button class="em-save" onclick="saveEdit()">✓ Save</button>
    </div>
    <div class="em-stabs" id="emStabs"></div>
    <div class="em-body" id="emBody"></div>`;
  m.classList.add('open');
  renderEditTabs();renderEditContent();
}

function closeEdit(){document.getElementById('editMod').classList.remove('open');}

function saveEdit(){
  customTasks=JSON.parse(JSON.stringify(editDraft));
  sv('customTasks',customTasks);
  refreshSecs();activeTab=secs[0].id;
  renderAll();closeEdit();
}

function renderEditTabs(){
  const el=document.getElementById('emStabs');if(!el)return;
  el.innerHTML='';
  EDIT_SECS.forEach(s=>{
    const b=document.createElement('button');
    b.className='em-stab'+(editSec===s.k?' act':'');
    b.textContent=s.l;
    b.onclick=()=>{editSec=s.k;renderEditTabs();renderEditContent();};
    el.appendChild(b);
  });
}

function renderEditContent(){
  const el=document.getElementById('emBody');if(!el)return;
  const tasks=editDraft[editSec];
  el.innerHTML='';
  const note=document.createElement('div');
  note.className='bath-note';
  note.innerHTML='🛁 <b>Bath time</b> is added automatically — Mon morning · Tue & Thu night · Sat night.';
  el.appendChild(note);
  tasks.forEach((t,i)=>{
    const row=document.createElement('div');row.className='edit-row';
    row.innerHTML=`
      <div class="edit-mv">
        <button onclick="mvTask(${i},-1)">▲</button>
        <button onclick="mvTask(${i},1)">▼</button>
      </div>
      <button class="edit-eb" onclick="openEp(${i})">${t.e}</button>
      <input class="edit-in" value="${t.l.replace(/"/g,'&quot;')}" oninput="editDraft['${editSec}'][${i}].l=this.value"/>
      <button class="edit-del" onclick="delTask(${i})">🗑️</button>`;
    el.appendChild(row);
  });
  const add=document.createElement('button');
  add.className='add-btn';add.textContent='+ Add Task';add.onclick=addTask;
  el.appendChild(add);
}

function mvTask(i,dir){const t=editDraft[editSec],j=i+dir;if(j<0||j>=t.length)return;[t[i],t[j]]=[t[j],t[i]];renderEditContent();}
function delTask(i){editDraft[editSec].splice(i,1);renderEditContent();}
function addTask(){editDraft[editSec].push({id:`t${Date.now()}`,e:'⭐',l:'New Task'});renderEditContent();}

// ── EMOJI PICKER ───────────────────────────────────────
function openEp(idx){
  epCb=(emoji)=>{editDraft[editSec][idx].e=emoji;renderEditContent();closeEp();};
  const el=document.getElementById('epick');
  let html=`<div class="ep-hd"><span>Pick an Emoji</span><button class="ep-close" onclick="closeEp()">✕ Close</button></div>`;
  EG.forEach(g=>{
    html+=`<div class="eg-title">${g.n}</div><div class="eg-grid">`;
    g.e.forEach(em=>{html+=`<button class="eg-btn" onclick="epCb('${em}')">${em}</button>`;});
    html+='</div>';
  });
  el.innerHTML=html;
  document.getElementById('epov').classList.add('show');
  el.classList.add('open');
}
function closeEp(){document.getElementById('epov').classList.remove('show');document.getElementById('epick').classList.remove('open');}

// ── CHANGE PROFILE ─────────────────────────────────────
let profSelAv='';
function openProf(){
  profSelAv=profile.avatar;
  const m=document.getElementById('profMod');
  m.innerHTML=`
    <div class="em-top">
      <button class="em-back" onclick="closeProfMod()">← Back</button>
      <span class="em-title">👤 Change Profile</span>
      <button class="em-save" onclick="saveProf()">✓ Save</button>
    </div>
    <div class="em-body">
      <div class="ob-lbl" style="margin-bottom:8px">Your name</div>
      <input class="ob-in" id="profName" value="${profile.name}" maxlength="20" style="margin-bottom:20px"/>
      <div class="ob-lbl" style="margin-bottom:8px">Your avatar</div>
      <div class="av-grid" id="profAvGrid"></div>
    </div>`;
  buildAvGrid('profAvGrid',profSelAv,av=>profSelAv=av);
  m.classList.add('open');
}
function closeProfMod(){document.getElementById('profMod').classList.remove('open');}
function saveProf(){
  const name=(document.getElementById('profName').value||'').trim();
  if(!name)return;
  profile={name,avatar:profSelAv};sv('profile',profile);
  closeProfMod();renderHdr();
}

// ── HOLIDAY TOGGLE ─────────────────────────────────────
function toggleHoliday(){
  rState._holiday=!rState._holiday;rState._bonus=false;
  sv(rKey,rState);refreshSecs();activeTab=secs[0].id;renderAll();
}

// ── CHECK TASK ─────────────────────────────────────────
function checkTask(id,ev){
  rState[id]=true;sv(rKey,rState);playTick();
  if(ev)showStarPop(ev.clientX,ev.clientY);
  gamedata.totalStars++;sv('gamedata',gamedata);
  renderHdr();renderLvl();
  const item=document.querySelector(`[data-id="${id}"]`);
  if(item){const isHol=!!rState._holiday;item.className=`task ${isHol?'hd':'d'}`;item.querySelector('.cb').textContent='✓';item.onclick=null;}
  const sec=secs.find(s=>s.tasks.some(t=>t.id===id));
  if(sec){
    const done=sec.tasks.filter(t=>rState[t.id]).length;
    const scc=document.getElementById('scc');if(scc)scc.textContent=`${done}/${sec.tasks.length}`;
    renderTabs();if(done===sec.tasks.length)playSec();
  }
  updateProg();
  const all=secs.flatMap(s=>s.tasks);
  if(all.every(t=>rState[t.id])&&!rState._bonus){
    rState._bonus=true;gamedata.totalStars+=5;
    const isHol=!!rState._holiday;
    if(isHol){if(!gamedata.holidayDays.includes(rDay))gamedata.holidayDays.push(rDay);}
    else{if(!gamedata.completedDays.includes(rDay))gamedata.completedDays.push(rDay);}
    sv('gamedata',gamedata);sv(rKey,rState);
    playWin();
    setTimeout(()=>launchConfetti(isHol),300);
    setTimeout(()=>launchConfetti(isHol),1800);
    renderHdr();renderLvl();renderStats();
  }
}

loadAll();
</script>
